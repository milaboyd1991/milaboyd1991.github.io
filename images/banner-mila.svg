<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" role="img" aria-label="Mila Boyd — UX/UI Designer, Digital Design, and Flooring. Bridging real-world service and human-centered design.">
  <!-- Background -->
  <rect x="0" y="0" width="1600" height="500" fill="#F7EFE2"/>
  <!-- Right anchor panel -->
  <rect x="1040" y="0" width="560" height="500" fill="#EFE3D0"/>
  <!-- Thin top + bottom brand rules -->
  <rect x="0" y="0" width="1600" height="6" fill="#2E4A3C"/>
  <rect x="0" y="494" width="1600" height="6" fill="#C9A24B"/>

  <!-- ============ LEFT: TEXT ============ -->
  <text x="92" y="120" font-family="Arial, sans-serif" font-size="22" letter-spacing="6" font-weight="700" fill="#B0793F">UX/UI  ·  DIGITAL DESIGN  ·  FLOORING &amp; INTERIOR</text>

  <text x="88" y="245" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="700" fill="#1E1812">Mila Boyd</text>

  <text x="92" y="300" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#2E4A3C">UX/UI Designer · Digital Design Student · Founder, PNW Floor Design</text>

  <rect x="92" y="328" width="430" height="3" fill="#C9A24B"/>

  <text x="92" y="382" font-family="Georgia, 'Times New Roman', serif" font-size="29" font-style="italic" fill="#4A3F33">Bridging real-world service and human-centered design.</text>

  <!-- ============ SKILL TAGS ============ -->
  <g font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1E1812">
    <rect x="92"  y="420" width="104" height="46" rx="23" fill="none" stroke="#B0793F" stroke-width="2"/>
    <text x="144" y="450" text-anchor="middle">UX/UI</text>

    <rect x="210" y="420" width="200" height="46" rx="23" fill="none" stroke="#B0793F" stroke-width="2"/>
    <text x="310" y="450" text-anchor="middle">Design Systems</text>

    <rect x="424" y="420" width="180" height="46" rx="23" fill="none" stroke="#B0793F" stroke-width="2"/>
    <text x="514" y="450" text-anchor="middle">Visual Design</text>

    <rect x="618" y="420" width="140" height="46" rx="23" fill="none" stroke="#B0793F" stroke-width="2"/>
    <text x="688" y="450" text-anchor="middle">Flooring</text>

    <rect x="772" y="420" width="196" height="46" rx="23" fill="none" stroke="#B0793F" stroke-width="2"/>
    <text x="870" y="450" text-anchor="middle">Service Design</text>
  </g>

  <!-- ============ RIGHT: BRAND MOTIF (bridge + rising sun + flooring tiles) ============ -->
  <!-- Rising sun -->
  <circle cx="1320" cy="150" r="58" fill="#C9A24B"/>
  <!-- Bridge arch -->
  <path d="M 1150 330 A 170 150 0 0 1 1490 330" fill="none" stroke="#2E4A3C" stroke-width="12" stroke-linecap="round"/>
  <!-- Pillars -->
  <rect x="1150" y="330" width="16" height="92" rx="3" fill="#B0793F"/>
  <rect x="1474" y="330" width="16" height="92" rx="3" fill="#B0793F"/>
  <!-- Suspension lines -->
  <g stroke="#2E4A3C" stroke-width="3" opacity="0.7">
    <line x1="1210" y1="296" x2="1210" y2="330"/>
    <line x1="1270" y1="278" x2="1270" y2="330"/>
    <line x1="1320" y1="272" x2="1320" y2="330"/>
    <line x1="1370" y1="278" x2="1370" y2="330"/>
    <line x1="1430" y1="296" x2="1430" y2="330"/>
  </g>
  <!-- Deck line -->
  <rect x="1150" y="330" width="340" height="6" fill="#2E4A3C"/>

  <!-- Flooring tiles at base -->
  <g>
    <rect x="1188" y="380" width="40" height="40" fill="#B0793F"/>
    <rect x="1232" y="380" width="40" height="40" fill="none" stroke="#B0793F" stroke-width="2"/>
    <rect x="1276" y="380" width="40" height="40" fill="#C9A24B"/>
    <rect x="1320" y="380" width="40" height="40" fill="none" stroke="#B0793F" stroke-width="2"/>
    <rect x="1364" y="380" width="40" height="40" fill="#B0793F"/>
    <rect x="1408" y="380" width="40" height="40" fill="none" stroke="#B0793F" stroke-width="2"/>
  </g>
</svg>
